plugins { id 'com.android.application' }

android {
    namespace 'com.navioverlay.car'
    compileSdk 34

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId 'com.navioverlay.car'
        minSdk 23
        targetSdk 34
        versionCode 31
        versionName 'v1.4'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
            shrinkResources false
        }
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}
